name: PithWire Cron Trigger

# CF-CF ループ問題（Error 1000）を回避するため、CFの外側から /run-news を叩く。
# Claude Code Routines はサンドボックスで外部host制限があり不可（2026-04-15確認）。
# GitHub Actions から5言語順次 curl する構成。
# Public repo なので Actions 無制限無料。

on:
  schedule:
    - cron: '7 */6 * * *'   # 1日4回（0:07, 6:07, 12:07, 18:07 UTC）素数分
  workflow_dispatch:         # 手動トリガー

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Trigger 5-language distribution
        run: |
          echo "Starting at $(date -u +%H:%M:%S) UTC"
          for LANG in ja en ko hi id; do
            echo ""
            echo "=== Processing $LANG ==="
            curl -sS --max-time 300 -w "\nHTTP:%{http_code} time:%{time_total}s\n" \
              "https://pithwire.com/run-news?key=${{ secrets.RUN_KEY }}&lang=$LANG&limit=10" || echo "(lang=$LANG failed, continuing)"
            sleep 3
          done
          echo ""
          echo "All languages processed at $(date -u +%H:%M:%S) UTC"
